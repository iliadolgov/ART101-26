<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Pokemon on the Dunes of Arrakis Data Layer</title>
  <link rel="stylesheet" href="env03.css">
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="env03.js" defer></script>
</head>
<body>
  <div id="page">
    <div id="top-zone">
      <p id="scene-text">Somewhere between a Pokemon route and the dunes of Arrakis, the sand keeps moving and the creatures keep listening.</p>
      <img id="time-orb" src='data:image/svg+xml,%3Csvg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120"%3E%3Cdefs%3E%3CradialGradient id="sun" cx="38%25" cy="35%25" r="60%25"%3E%3Cstop offset="0%25" stop-color="%23fff7b0"/%3E%3Cstop offset="58%25" stop-color="%23f7b733"/%3E%3Cstop offset="100%25" stop-color="%23d66b1f"/%3E%3C/radialGradient%3E%3C/defs%3E%3Ccircle cx="60" cy="60" r="43" fill="url(%23sun)"/%3E%3Ccircle cx="75" cy="46" r="34" fill="%234a5575" opacity=".86"/%3E%3C/svg%3E' alt="Sun and moon time selector">
      <div id="flygon-area">
        <img id="flygon" src="../labs/arrakis_sample/images/flygon.png" alt="Flygon gliding above the dunes">
      </div>
    </div>

    <div id="data-panel">
      <div id="environment-output">Choose a signal from the dunes.</div>
      <div id="environment-controls">
        <button id="title-button">Title</button>
        <button id="elements-button">Elements</button>
        <button id="entity-button">Main Entity</button>
        <button id="warnings-button">Warnings</button>
        <button id="scan-button">Scan Count</button>
      </div>
    </div>

    <div id="main-zone">
      <div class="character-card" id="sandshrew-card">
        <img id="sandshrew" src="../labs/arrakis_sample/images/sandshrew.png" alt="Sandshrew standing on the sand">
        <p>Sandshrew waits for the wind to shift.</p>
      </div>

      <div class="character-card" id="trapinch-card">
        <img id="trapinch" src="../labs/arrakis_sample/images/trapinch.png" alt="Trapinch half-buried in the dunes">
        <p>Trapinch watches the dune line for movement.</p>
      </div>
    </div>
  </div>
</body>
</html>
