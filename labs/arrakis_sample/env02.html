<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Pokemon on the Dunes of Arrakis</title>
  <link href="env02.css" rel="stylesheet" type="text/css">
</head>
<body>
  <div id="page">
    <div id="top-zone">
      <p id="scene-text">Somewhere between a Pokemon route and the dunes of Arrakis, the sand keeps moving and the creatures keep listening.</p>
      <img id="flygon" src="images/flygon.png" alt="Flygon gliding above the dunes">
    </div>

    <div id="main-zone">
      <div class="character-card" id="sandshrew-card">
        <img id="sandshrew" src="images/sandshrew.png" alt="Sandshrew standing on the sand">
        <p>Sandshrew waits for the wind to shift.</p>
      </div>

      <div class="character-card" id="trapinch-card">
        <img id="trapinch" src="images/trapinch.png" alt="Trapinch half-buried in the dunes">
        <p>Trapinch watches the dune line for movement.</p>
      </div>
    </div>
  </div>
</body>
</html>
